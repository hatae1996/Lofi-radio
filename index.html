<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lofi radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  font-family: 'DM Sans', sans-serif;
  cursor: none;
  color: white;
}

/* ── CURSOR ── */
#cursor {
  position: fixed; width: 8px; height: 8px;
  background: rgba(255,255,255,0.85); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .18s ease, height .18s ease, background .18s ease, opacity .3s ease;
}
#cursor.hidden { opacity: 0; }
#cursor.hover { width: 26px; height: 26px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.3); }

/* ── BG ── */
#bg-img {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
  opacity: 1; transition: opacity .6s ease;
  filter: blur(10px) brightness(0.65);
  transform: scale(1.03);
}
#bg-img.hidden { opacity: 0; }

/* ── CD VINYL ── */
#cd-wrap {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none;
  display: none;
}
#cd-wrap.visible { display: block; pointer-events: auto; }

#cd {
  position: relative;
  width: 840px; height: 840px;
  border-radius: 50%;
  animation: cd-spin 40s linear infinite;
  animation-play-state: paused;
}
body.playing #cd { animation-play-state: running; }
@keyframes cd-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 바깥 테두리 링 */
#cd::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.12),
    inset 0 0 0 10px rgba(0,0,0,0.35),
    inset 0 0 0 12px rgba(255,255,255,0.06),
    inset 0 0 0 40px rgba(0,0,0,0.25),
    inset 0 0 0 42px rgba(255,255,255,0.04);
  z-index: 2;
}

/* 앨범 이미지 원형 클립 */
#cd-img {
  position: absolute; inset: 0;
  border-radius: 50%;
  object-fit: cover;
  width: 100%; height: 100%;
  z-index: 1;
}

/* CD 광택 오버레이 */
#cd-gloss {
  position: absolute; inset: 0; border-radius: 50%; z-index: 3;
  background: conic-gradient(
    rgba(255,255,255,0.08) 0deg,
    rgba(255,255,255,0.02) 60deg,
    rgba(255,255,255,0.1) 120deg,
    rgba(255,255,255,0.01) 180deg,
    rgba(255,255,255,0.07) 240deg,
    rgba(255,255,255,0.01) 300deg,
    rgba(255,255,255,0.08) 360deg
  );
}

/* 가운데 구멍 */
#cd-hole {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 84px; height: 84px; border-radius: 50%;
  background: #0a0a0a;
  z-index: 4;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.1), 0 0 0 4px rgba(0,0,0,0.5);
}

/* CD 없을 때 플레이스홀더 CD */
#cd-empty {
  position: absolute; inset: 0; border-radius: 50%; z-index: 1;
  background: radial-gradient(circle at 50% 50%,
    #2a2a2a 0%, #1a1a1a 40%, #222 60%, #1a1a1a 100%
  );
}

/* 그림자 */
#cd-shadow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 840px; height: 840px; border-radius: 50%;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 6px 24px rgba(0,0,0,0.5);
  z-index: 0; pointer-events: none;
}
#bg-placeholder {
  position: fixed; inset: 0; z-index: 0;
  background: #0d0d0d;
  display: flex; align-items: center; justify-content: center;
}
#bg-placeholder svg { opacity: 0.05; }

#grain {
  position: fixed; inset: -50%; width: 200%; height: 200%;
  z-index: 1; opacity: 0.04; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain .45s steps(1) infinite;
}
@keyframes grain {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(-3%,-2%); }
  50%  { transform: translate(2%,3%); }
  75%  { transform: translate(-1%,2%); }
}

#overlay { position: fixed; inset: 0; z-index: 2; background: rgba(0,0,0,0.2); pointer-events: none; }
#vignette-top { position: fixed; top: 0; left: 0; right: 0; height: 130px; z-index: 3; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.45), transparent); }
#vignette-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 220px; z-index: 3; pointer-events: none; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); opacity: 0; transition: opacity .4s ease; }
body.ui-visible #vignette-bottom { opacity: 1; }

/* ── UI FADE ── */
.ui-el { opacity: 0; transition: opacity .3s ease; pointer-events: none; }
body.ui-visible .ui-el { opacity: 1; pointer-events: auto; }

/* ── NOW PLAYING ── */
#now-playing { position: fixed; top: 28px; left: 32px; z-index: 10; }
#now-playing .lbl { font-size: 10px; font-weight: 400; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 5px; }
#now-playing .song { font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.92); letter-spacing: -.015em; line-height: 1.2; }
#now-playing .artist { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.4); margin-top: 3px; }

/* waveform */
#waveform { position: fixed; top: 110px; left: 34px; z-index: 10; display: flex; align-items: flex-end; gap: 3px; height: 16px; }
.wb { width: 3px; border-radius: 2px; background: rgba(255,255,255,0.28); transform-origin: bottom; animation: wa 1.3s ease-in-out infinite; animation-play-state: paused; }
.wb:nth-child(1){animation-delay:0s} .wb:nth-child(2){animation-delay:.18s} .wb:nth-child(3){animation-delay:.06s}
.wb:nth-child(4){animation-delay:.24s} .wb:nth-child(5){animation-delay:.12s} .wb:nth-child(6){animation-delay:.3s} .wb:nth-child(7){animation-delay:.09s}
@keyframes wa { 0%,100%{transform:scaleY(.3)} 50%{transform:scaleY(1)} }
body.playing .wb { animation-play-state: running; }

/* ── CONTROLS ── */
#controls { position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%); z-index: 11; display: flex; align-items: center; gap: 18px; }
.cbtn {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
  cursor: none; transition: border-color .2s, background .2s, transform .12s;
}
.cbtn:hover { border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.1); transform: scale(1.08); }
.cbtn:active { transform: scale(0.94); }
.cbtn svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.75); pointer-events: none; }
.cbtn.play { width: 56px; height: 56px; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.07); }
.cbtn.play svg { width: 22px; height: 22px; }

/* ── PROGRESS ── */
#prog-wrap { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 0 32px 14px; }
#time-row { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300; color: rgba(255,255,255,0.25); letter-spacing: .05em; margin-bottom: 7px; }
#prog-track { width: 100%; height: 1px; background: rgba(255,255,255,0.1); position: relative; cursor: none; transition: height .2s; }
#prog-track:hover { height: 2px; }
#prog-fill { height: 100%; background: rgba(255,255,255,0.5); border-radius: 1px; width: 0%; transition: width .4s linear; }
#prog-thumb { position: absolute; top: 50%; transform: translate(-50%,-50%) scale(0); width: 10px; height: 10px; border-radius: 50%; background: white; left: 0%; transition: transform .2s; pointer-events: none; }
#prog-track:hover #prog-thumb { transform: translate(-50%,-50%) scale(1); }

/* ── AMBIENT PANEL ── */
#amb-toggle {
  position: fixed; top: 50%; left: 0; transform: translateY(-50%);
  z-index: 20; width: 18px; height: 52px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-left: none;
  border-radius: 0 5px 5px 0;
  display: flex; align-items: center; justify-content: center;
  cursor: none; transition: background .2s, left .35s cubic-bezier(.4,0,.2,1);
  pointer-events: auto !important; opacity: 1 !important;
}
#amb-toggle:hover { background: rgba(255,255,255,0.1); }
#amb-toggle svg { width: 9px; height: 9px; transition: transform .35s cubic-bezier(.4,0,.2,1); }
body.amb-open #amb-toggle { left: 260px; }
body.amb-open #amb-toggle svg { transform: rotate(180deg); }

#amb-panel {
  position: fixed; top: 0; left: -260px; width: 260px; height: 100%;
  z-index: 15; display: flex; flex-direction: column;
  background: rgba(7,7,7,0.7); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border-right: 1px solid rgba(255,255,255,0.07);
  transition: left .35s cubic-bezier(.4,0,.2,1);
}
body.amb-open #amb-panel { left: 0; }

#amb-head {
  padding: 26px 18px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;
}
#amb-head .info .lbl { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,0.22); }
#amb-head .info .title { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.82); letter-spacing: -.02em; margin-top: 2px; }

#add-amb-btn {
  display: none;
  align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400;
  color: rgba(255,255,255,0.5); cursor: none; white-space: nowrap;
  transition: border-color .2s, background .2s, color .2s;
}
body.admin #add-amb-btn { display: flex; }
#add-amb-btn:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
#add-amb-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

.amb-del {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.3);
  display: none; align-items: center; justify-content: center;
  cursor: none; flex-shrink: 0; transition: background .15s, border-color .15s;
}
body.admin .amb-del { display: flex; }
.amb-del:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.28); }
.amb-del svg { width: 8px; height: 8px; fill: rgba(255,255,255,0.5); pointer-events: none; }

#amb-list { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; scrollbar-width: none; }
#amb-list::-webkit-scrollbar { display: none; }

.amb-item {
  display: flex; flex-direction: column; gap: 8px;
  padding: 12px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  transition: background .2s, border-color .2s;
}
.amb-item.active { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }

.amb-top { display: flex; align-items: center; gap: 10px; }
.amb-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
.amb-name { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.65); flex: 1; }
.amb-toggle-btn {
  width: 28px; height: 16px; border-radius: 8px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  position: relative; cursor: none; flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.amb-toggle-btn::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.4);
  transition: left .2s, background .2s;
}
.amb-item.active .amb-toggle-btn { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.35); }
.amb-item.active .amb-toggle-btn::after { left: 14px; background: white; }

.amb-vol {
  -webkit-appearance: none; height: 1px;
  background: rgba(255,255,255,0.12); border-radius: 1px; outline: none;
  cursor: none; width: 100%; display: none;
  transition: background .2s;
}
.amb-item.active .amb-vol { display: block; }
.amb-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.65); cursor: none; }

#amb-foot {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
#amb-stop-all {
  width: 100%; padding: 9px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
  color: rgba(255,255,255,0.4); cursor: none;
  transition: border-color .2s, background .2s, color .2s;
}
#amb-stop-all:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); }


#sb-toggle {
  position: fixed; top: 50%; right: 0; transform: translateY(-50%);
  z-index: 20; width: 18px; height: 52px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-right: none;
  border-radius: 5px 0 0 5px;
  display: flex; align-items: center; justify-content: center;
  cursor: none; transition: background .2s, right .35s cubic-bezier(.4,0,.2,1);
  pointer-events: auto !important; opacity: 1 !important;
}
#sb-toggle:hover { background: rgba(255,255,255,0.1); }
#sb-toggle svg { width: 9px; height: 9px; transition: transform .35s cubic-bezier(.4,0,.2,1); }
body.sb-open #sb-toggle { right: 300px; }
body.sb-open #sb-toggle svg { transform: rotate(180deg); }

/* ── SIDEBAR ── */
#sidebar {
  position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
  z-index: 15; display: flex; flex-direction: column;
  background: rgba(7,7,7,0.7); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border-left: 1px solid rgba(255,255,255,0.07);
  transition: right .35s cubic-bezier(.4,0,.2,1);
}
body.sb-open #sidebar { right: 0; }

#sb-head {
  padding: 26px 18px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;
}
#sb-head .info .lbl { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,0.22); }
#sb-head .info .cnt { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.82); letter-spacing: -.02em; margin-top: 2px; }

#add-btn, #add-folder-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400;
  color: rgba(255,255,255,0.5); cursor: none; white-space: nowrap;
  transition: border-color .2s, background .2s, color .2s;
}
#add-btn:hover, #add-folder-btn:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
#add-btn svg, #add-folder-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

/* ── FOLDER VIEW ── */
#folder-view, #track-view { flex: 1; overflow-y: auto; padding: 10px 14px; scrollbar-width: none; display: flex; flex-direction: column; gap: 8px; }
#folder-view::-webkit-scrollbar, #track-view::-webkit-scrollbar { display: none; }
#track-view { display: none; }

.folder-card {
  position: relative; width: 100%; height: 80px;
  border-radius: 12px; overflow: hidden; cursor: none; flex-shrink: 0;
  transition: transform .15s ease;
}
.folder-card:hover { transform: scale(1.015); }
.folder-card.playing { box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.35); }

.folder-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.45; transition: opacity .2s;
}
.folder-card:hover .folder-bg { opacity: 0.6; }
.folder-card.playing .folder-bg { opacity: 0.65; }
.folder-bg-empty { position: absolute; inset: 0; background: rgba(255,255,255,0.03); }

/* 폴더 카드 그라데이션 */
.folder-grad {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 100%);
}

.folder-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px 36px 10px 13px;
}
.folder-name {
  font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.92);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 1px 8px rgba(0,0,0,0.8); line-height: 1.3;
}
.folder-meta {
  font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.45);
  margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}
.folder-card.playing .folder-name { color: white; }

.folder-del {
  position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: none; opacity: 0; transition: opacity .15s, background .15s;
}
.folder-card:hover .folder-del { opacity: 1; }
.folder-del:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
.folder-del svg { width: 9px; height: 9px; fill: rgba(255,255,255,0.55); pointer-events: none; }

/* 트랙 뷰 헤더 (뒤로가기) */
#track-view-head {
  padding: 14px 18px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#back-btn {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: none; flex-shrink: 0; transition: border-color .2s, background .2s;
}
#back-btn:hover { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.07); }
#back-btn svg { width: 10px; height: 10px; fill: rgba(255,255,255,0.5); pointer-events: none; }
#track-view-folder-name {
  font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.8);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* playlist (track list) */
#playlist { flex: 1; overflow-y: auto; padding: 10px 14px; scrollbar-width: none; display: flex; flex-direction: column; gap: 8px; }
#playlist::-webkit-scrollbar { display: none; }


.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; padding: 40px 20px; text-align: center;
}
.empty-state svg { opacity: 0.1; }
.empty-state p { font-size: 13px; color: rgba(255,255,255,0.22); line-height: 1.7; font-weight: 300; }

/* track card */
.track-item {
  position: relative; width: 100%; height: 72px;
  border-radius: 10px; overflow: hidden; cursor: none; flex-shrink: 0;
  transition: transform .15s ease;
}
.track-item:hover { transform: scale(1.015); }
.track-item.active { box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.38); }

.track-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.5; transition: opacity .2s;
}
.track-item:hover .track-bg { opacity: 0.65; }
.track-item.active .track-bg { opacity: 0.7; }
.track-bg-empty { position: absolute; inset: 0; background: rgba(255,255,255,0.03); }

.track-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 34px 10px 13px; }
.track-title {
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
  text-shadow: 0 1px 8px rgba(0,0,0,0.7);
}
.track-artist {
  font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.42);
  margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
.track-item.active .track-title { color: white; }

  position: absolute; top: 8px; right: 34px;

async function sha256(str) {

const fmt = s => (!s || isNaN(s)) ? '0:00' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

function tracksInFolder(fid) { return allTracks.filter(t => t.folder_id === fid); }

async function uploadFile(file, path) {
  const { data, error } = await sb.storage.from(BUCKET).upload(path, file, { upsert: true });
  if (error) throw error;
  const { data: { publicUrl } } = sb.storage.from(BUCKET).getPublicUrl(path);
  return publicUrl;
}

function readFile(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(r.error);
    r.readAsArrayBuffer(file);
  });
}

// ── LOAD TRACK ───────────────────────────────────────
const cdWrap  = document.getElementById('cd-wrap');

function loadTrack(i, autoplay = true) {
  if (!tracks.length) return;
  currentIndex = i;
  const t = tracks[i];
  xfade.classList.add('on');
  setTimeout(() => {

      bgImg.classList.add('hidden'); bgHolder.style.display = 'flex';

    }
    songEl.textContent   = t.title;
    artistEl.textContent = t.artist || '—';
    renderTracks();
    renderFolders();

  }, 340);
}

// ── PLAY/PAUSE ───────────────────────────────────────
function togglePlay() {
  if (!tracks.length) return;
  if (audio.paused) audio.play(); else audio.pause();
}
function syncBtn() {
  isPlaying = !audio.paused;
  playIcon.innerHTML = isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  document.body.classList.toggle('playing', isPlaying);
}
audio.addEventListener('play',  syncBtn);
audio.addEventListener('pause', syncBtn);
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = audio.currentTime / audio.duration * 100;
  progFill.style.width = p + '%'; progThumb.style.left = p + '%';
  tCur.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => { tTot.textContent = fmt(audio.duration); });
audio.addEventListener('ended', () => {
  if (isShuffle) {
    const next = shuffleOrder.shift();
    if (shuffleOrder.length === 0) buildShuffleOrder(next);
    loadTrack(next, true);
  } else {
    loadTrack((currentIndex + 1) % tracks.length, true);
  }
});

function buildShuffleOrder(exclude) {
  shuffleOrder = tracks.map((_, i) => i).filter(i => i !== exclude);
  for (let i = shuffleOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
  }
}

const shuffleBtn = document.getElementById('shuffle-btn');
shuffleBtn.addEventListener('click', () => {
  isShuffle = !isShuffle;
  shuffleBtn.classList.toggle('on', isShuffle);
  if (isShuffle) buildShuffleOrder(currentIndex);
});

document.getElementById('prog-track').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  if (audio.duration) audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
});
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-prev').addEventListener('click', () => { if (tracks.length) loadTrack((currentIndex - 1 + tracks.length) % tracks.length, !audio.paused); });
document.getElementById('btn-next').addEventListener('click', () => { if (tracks.length) loadTrack((currentIndex + 1) % tracks.length, !audio.paused); });

// ── DELETE TRACK ─────────────────────────────────────
async function removeTrack(i) {
  const t = tracks[i];
  const wasPlaying = !audio.paused;
  await sb.from('tracks').delete().eq('id', t.id);
  allTracks = allTracks.filter(x => x.id !== t.id);
  tracks = tracksInFolder(currentFolderId);
  if (!tracks.length) {
    currentIndex = -1; audio.pause(); audio.src = '';
    bgImg.classList.add('hidden'); bgHolder.style.display = 'flex';
    cdWrap.classList.remove('visible');
    songEl.textContent = '—'; artistEl.textContent = '—';
    renderTracks();
  } else {
    if (currentIndex >= tracks.length) currentIndex = tracks.length - 1;
    if (i === currentIndex) loadTrack(currentIndex, wasPlaying); else renderTracks();
  }
  renderFolders();
}

  if (error) { alert('수정 실패: ' + error.message); return; }

  Object.assign(t, updates);
  const at = allTracks.find(x => x.id === t.id);
  if (at) Object.assign(at, updates);

  if (editingIndex === currentIndex) {
    songEl.textContent = t.title;
    if (updates.img_url) { bgImg.src = updates.img_url; cdImg.src = updates.img_url; }
  }
  renderTracks(); renderFolders();
  closeEditModal();
});

// ── AMBIENT SOUND ENGINE ─────────────────────────────
const ambCtx = new (window.AudioContext || window.webkitAudioContext)();
const ambNodes = {}; // id → { src, gain, el }
let ambientList = []; // Supabase에서 불러온 목록

function makeAmbientFromURL(url) {
  return new Promise(res => {
    const audioEl = new Audio(url);
    audioEl.loop = true; audioEl.crossOrigin = 'anonymous';
    const src  = ambCtx.createMediaElementSource(audioEl);
    const gain = ambCtx.createGain(); gain.gain.value = 0;
    src.connect(gain); gain.connect(ambCtx.destination);
    res({ el: audioEl, gain });
  });
}

async function ambStart(id, url) {
  if (ambCtx.state === 'suspended') ambCtx.resume();
  if (ambNodes[id]) return;
  const node = await makeAmbientFromURL(url);
  node.el.play().catch(() => {});
  ambNodes[id] = node;
}

function ambStop(id) {
  if (!ambNodes[id]) return;
  ambNodes[id].gain.gain.setTargetAtTime(0, ambCtx.currentTime, 0.3);
  setTimeout(() => {
    try { ambNodes[id].el.pause(); } catch(e) {}
    delete ambNodes[id];
  }, 800);
}

function ambSetVol(id, vol) {
  if (!ambNodes[id]) return;
  ambNodes[id].gain.gain.setTargetAtTime(vol, ambCtx.currentTime, 0.1);
}

// ── AMBIENT RENDER ───────────────────────────────────
function renderAmbient() {
  const list = document.getElementById('amb-list');
  list.innerHTML = '';

  if (!ambientList.length) {
    list.innerHTML = `<div class="empty-state" style="height:200px;"><p style="font-size:13px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.7;">${isAdmin ? '추가 버튼으로<br>ambient를 추가해보세요' : '등록된 ambient가 없어요'}</p></div>`;
    return;
  }

  ambientList.forEach(a => {
    const item = document.createElement('div');
    item.className = 'amb-item';
    item.dataset.id = a.id;
    item.innerHTML = `
      <div class="amb-top">
        <div class="amb-icon">${a.icon || '🎵'}</div>
        <div class="amb-name">${a.name}</div>
        <div class="amb-toggle-btn"></div>
        <button class="amb-del"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
      </div>
      <input type="range" class="amb-vol" min="0" max="100" value="40">`;

    const btn = item.querySelector('.amb-toggle-btn');
    const vol = item.querySelector('.amb-vol');
    const del = item.querySelector('.amb-del');

    btn.addEventListener('click', async () => {
      const on = item.classList.toggle('active');
      if (on) { await ambStart(a.id, a.audio_url); ambSetVol(a.id, vol.value / 100 * 0.6); }
      else    { ambStop(a.id); }
    });

    vol.addEventListener('input', () => {
      if (item.classList.contains('active')) ambSetVol(a.id, vol.value / 100 * 0.6);
    });

    del.addEventListener('click', async () => {
      if (!confirm(`"${a.name}" 을 삭제할까요?`)) return;
      ambStop(a.id);
      await sb.from('ambient').delete().eq('id', a.id);
      ambientList = ambientList.filter(x => x.id !== a.id);
      renderAmbient();
    });

    list.appendChild(item);
  });

  setTimeout(() => setHover('.amb-item,.amb-toggle-btn,.amb-del,.amb-vol'), 40);
}

// ── AMBIENT PANEL UI ─────────────────────────────────
document.getElementById('amb-toggle').addEventListener('click', () => {
  document.body.classList.toggle('amb-open');
  setTimeout(() => setHover('.amb-item,.amb-toggle-btn,.amb-del,#amb-stop-all,.amb-vol,#add-amb-btn'), 100);
});

document.getElementById('amb-stop-all').addEventListener('click', () => {
  document.querySelectorAll('.amb-item.active').forEach(item => {
    item.classList.remove('active');
    ambStop(item.dataset.id);
  });
});
setHover('#amb-toggle,#amb-stop-all,#add-amb-btn');

// ── AMBIENT ADD MODAL ────────────────────────────────
const ambBackdrop   = document.getElementById('amb-modal-backdrop');
const ambNameInput  = document.getElementById('amb-name-input');
const ambIconInput  = document.getElementById('amb-icon-input');
const ambAudioInput = document.getElementById('amb-audio-input');
const ambConfirmBtn = document.getElementById('amb-modal-confirm');
let pendingAmbFile  = null;

function openAmbModal() {
  ambNameInput.value = ''; ambIconInput.value = '🎵';
  ambAudioInput.value = '';
  document.getElementById('amb-audio-name').style.display = 'none';
  document.getElementById('amb-zone-audio').classList.remove('filled');
  pendingAmbFile = null;
  ambConfirmBtn.disabled = true;
  ambBackdrop.style.opacity = '1'; ambBackdrop.style.pointerEvents = 'auto';
  document.getElementById('amb-modal').style.transform = 'translateY(0)';
  setTimeout(() => ambNameInput.focus(), 100);
}
function closeAmbModal() {
  ambBackdrop.style.opacity = '0'; ambBackdrop.style.pointerEvents = 'none';
  document.getElementById('amb-modal').style.transform = 'translateY(10px)';
}
function checkAmbReady() { ambConfirmBtn.disabled = !(ambNameInput.value.trim() && pendingAmbFile); }

document.getElementById('add-amb-btn').addEventListener('click', openAmbModal);
document.getElementById('amb-modal-cancel').addEventListener('click', closeAmbModal);
ambBackdrop.addEventListener('click', e => { if (e.target === ambBackdrop) closeAmbModal(); });
ambNameInput.addEventListener('input', checkAmbReady);

ambAudioInput.addEventListener('change', () => {
  const f = ambAudioInput.files[0]; if (!f) return;
  pendingAmbFile = f;
  const nameEl = document.getElementById('amb-audio-name');
  nameEl.textContent = f.name; nameEl.style.display = 'block';
  document.getElementById('amb-zone-audio').classList.add('filled');
  checkAmbReady();
});

ambConfirmBtn.addEventListener('click', async () => {
  if (!pendingAmbFile || !ambNameInput.value.trim()) return;
  ambConfirmBtn.disabled = true;
  ambConfirmBtn.textContent = '업로드 중…';
  try {
    const ts = Date.now();
    const path = `ambient/${ts}_${pendingAmbFile.name}`;
    const audioUrl = await uploadFile(pendingAmbFile, path);
    const { data, error } = await sb.from('ambient').insert({
      name: ambNameInput.value.trim(),
      icon: ambIconInput.value.trim() || '🎵',
      audio_url: audioUrl,
    }).select().single();
    if (error) throw error;
    ambientList.push(data);
    renderAmbient();
    closeAmbModal();
  } catch (err) {
    alert('업로드 실패: ' + err.message);
  } finally {
    ambConfirmBtn.disabled = false;
    ambConfirmBtn.textContent = '추가';
  }
});

// ── CD DRAG GESTURE ──────────────────────────────────
let dragStartX = null, isDragging = false;
cdWrap.style.pointerEvents = 'auto';
cdWrap.addEventListener('mousedown', e => { dragStartX = e.clientX; isDragging = false; });
cdWrap.addEventListener('mousemove', e => { if (dragStartX !== null && Math.abs(e.clientX - dragStartX) > 8) isDragging = true; });
cdWrap.addEventListener('mouseup', e => {
  if (dragStartX === null) return;
  const diff = e.clientX - dragStartX;
  if (Math.abs(diff) > 60 && tracks.length) {
    if (diff < 0) loadTrack((currentIndex + 1) % tracks.length, !audio.paused);
    else          loadTrack((currentIndex - 1 + tracks.length) % tracks.length, !audio.paused);
  }
  dragStartX = null; isDragging = false;
});
cdWrap.addEventListener('mouseleave', () => { dragStartX = null; isDragging = false; });
cdWrap.addEventListener('touchstart', e => { dragStartX = e.touches[0].clientX; }, { passive: true });
cdWrap.addEventListener('touchend', e => {
  if (dragStartX === null) return;
  const diff = e.changedTouches[0].clientX - dragStartX;
  if (Math.abs(diff) > 60 && tracks.length) {
    if (diff < 0) loadTrack((currentIndex + 1) % tracks.length, !audio.paused);
    else          loadTrack((currentIndex - 1 + tracks.length) % tracks.length, !audio.paused);
  }
  dragStartX = null;
});

// ── CURSOR TRAIL ─────────────────────────────────────
const TRAIL_COUNT = 12;
const trail = [];
for (let i = 0; i < TRAIL_COUNT; i++) {
  const dot = document.createElement('div');
  const size = Math.max(2, 7 - i * 0.5);
  dot.style.cssText = `position:fixed;border-radius:50%;pointer-events:none;z-index:9998;width:${size}px;height:${size}px;background:rgba(255,255,255,${0.55-i*0.04});transform:translate(-50%,-50%);transition:opacity .3s ease;`;
  document.body.appendChild(dot);
  trail.push({ el: dot, x: 0, y: 0 });
}
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
(function animateTrail() {
  trail.forEach((t, i) => {
    const prev = i === 0 ? { x: mouseX, y: mouseY } : trail[i-1];
    t.x += (prev.x - t.x) * (0.35 - i * 0.018);
    t.y += (prev.y - t.y) * (0.35 - i * 0.018);
    t.el.style.left = t.x + 'px'; t.el.style.top = t.y + 'px';
    t.el.style.opacity = document.body.classList.contains('ui-visible') || i < 4 ? '1' : '0';
  });
  requestAnimationFrame(animateTrail);
})();

// ── KEYBOARD ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('admin-modal-backdrop').style.pointerEvents === 'auto') { if (e.code === 'Escape') closeAdminModal(); return; }
  if (ambBackdrop.style.pointerEvents === 'auto') { if (e.code === 'Escape') closeAmbModal(); return; }
  if (editBackdrop.style.pointerEvents === 'auto') { if (e.code === 'Escape') closeEditModal(); return; }
  if (folderBackdrop.style.pointerEvents === 'auto') { if (e.code === 'Escape') closeFolderModal(); return; }
  if (backdrop.classList.contains('open')) { if (e.code === 'Escape') closeModal(); return; }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); showUI(); }
  if (e.code === 'ArrowRight') document.getElementById('btn-next').click();
  if (e.code === 'ArrowLeft')  document.getElementById('btn-prev').click();
});

// ── INIT ─────────────────────────────────────────────
(async () => {
  // 세션 유지
  if (sessionStorage.getItem('lofi_admin') === '1') setAdminMode(true);

  const [{ data: fData }, { data: tData }, { data: aData }] = await Promise.all([
    sb.from('folders').select('*').order('created_at'),
    sb.from('tracks').select('*').order('created_at'),
    sb.from('ambient').select('*').order('created_at'),
  ]);
  folders     = fData || [];
  allTracks   = tData || [];
  ambientList = aData || [];

  renderFolders();
  renderAmbient();
  setTimeout(() => { document.body.classList.remove('ui-visible'); cursor.classList.add('hidden'); }, 2500);
})();
</script>
